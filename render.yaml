services:
  # 1. Redis instance for Inventory Queue
  - type: keyvalue
    name: nt-redis
    ipAllowList: [] # Private access only

  # 2. Orchestrator Service
  - type: web
    name: nt-orchestrator
    env: docker
    dockerfilePath: orchestrator/Dockerfile
    plan: free
    numInstances: 1
    envVars:
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false # User will input their Neon DB URL in Render UI
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: nt-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: nt-redis
          property: port
      - key: TASK_QUEUE_URL
        value: https://nt-task-queue.onrender.com

  # 3. Payment Service
  - type: web
    name: nt-payment-service
    env: docker
    dockerfilePath: payment-service/Dockerfile
    plan: free
    numInstances: 1
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  # 4. Shipping Service
  - type: web
    name: nt-shipping-service
    env: docker
    dockerfilePath: shipping-service/Dockerfile
    plan: free
    numInstances: 1
    envVars:
      - key: PORT
        value: 3002
      - key: DATABASE_URL
        sync: false
      - key: SHIPROCKET_EMAIL
        sync: false
      - key: SHIPROCKET_PASSWORD
        sync: false
      - key: SHIPROCKET_CHANNEL_ID
        sync: false

  # 5. Notification Service
  - type: web
    name: nt-notification-service
    env: docker
    dockerfilePath: notification-service/Dockerfile
    plan: free
    numInstances: 1
    envVars:
      - key: PORT
        value: 3004
      - key: DATABASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: SENDGRID_API_KEY
        sync: false

  # 6. Inventory Service Python Web Service (Runs worker + health check)
  - type: web
    name: nt-inventory-service
    env: docker
    dockerfilePath: inventory-service/Dockerfile
    plan: free
    numInstances: 1
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: nt-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: nt-redis
          property: port

  # 7. Frontend Service (served as static site on Render)
  - type: web
    name: nt-frontend
    env: static
    buildCommand: npm run build
    staticPublishPath: dist
    plan: free
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://nt-orchestrator.onrender.com/api/v1 # Update with actual deployed orchestrator URL

  # 8. Approval Service
  - type: web
    name: nt-approval-service
    env: docker
    dockerfilePath: approval_service/Dockerfile
    plan: free
    numInstances: 1
    envVars:
      - key: PORT
        value: 3005
      - key: DATABASE_URL
        sync: false
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: nt-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: nt-redis
          property: port
      - key: ORCHESTRATOR_URL
        value: https://nt-orchestrator.onrender.com

  # 9. Task Queue Service
  - type: web
    name: nt-task-queue
    env: docker
    dockerfilePath: task-queue/task-queue-js/Dockerfile
    plan: free
    numInstances: 1
    envVars:
      - key: PORT
        value: 4001
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: nt-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: nt-redis
          property: port
      - key: ORCHESTRATOR_URL
        value: https://nt-orchestrator.onrender.com
      - key: PAYMENT_SERVICE_URL
        value: https://nt-payment-service.onrender.com
      - key: SHIPPING_SERVICE_URL
        value: https://nt-shipping-service.onrender.com
      - key: NOTIFICATION_SERVICE_URL
        value: https://nt-notification-service.onrender.com
      - key: APPROVAL_SERVICE_URL
        value: https://nt-approval-service.onrender.com
