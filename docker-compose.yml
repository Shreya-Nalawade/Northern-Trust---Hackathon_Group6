version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: nt-redis
    ports:
      - "6379:6379"

  orchestrator:
    build: ./orchestrator
    container_name: nt-orchestrator
    ports:
      - "4000:4000"
    env_file:
      - ./orchestrator/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  payment-service:
    build: ./payment-service
    container_name: nt-payment-service
    ports:
      - "3001:3001"
    env_file:
      - ./payment-service/.env

  shipping-service:
    build: ./shipping-service
    container_name: nt-shipping-service
    ports:
      - "3002:3002"
    env_file:
      - ./shipping-service/.env

  notification-service:
    build: ./notification-service
    container_name: nt-notification-service
    ports:
      - "3004:3004"
    env_file:
      - ./notification-service/.env

  inventory-service:
    build: ./inventory-service
    container_name: nt-inventory-service
    env_file:
      - ./inventory-service/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  frontend:
    build: ./frontend
    container_name: nt-frontend
    ports:
      - "80:80"
    depends_on:
      - orchestrator
