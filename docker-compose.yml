version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: nt-redis
    ports:
      - "6379:6379"

  orchestrator:
    build: ./orchestrator
    container_name: nt-orchestrator
    ports:
      - "4000:4000"
    env_file:
      - ./orchestrator/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TASK_QUEUE_URL=http://task-queue:4001
    depends_on:
      - redis

  payment-service:
    build: ./payment-service
    container_name: nt-payment-service
    ports:
      - "3001:3001"
    env_file:
      - ./payment-service/.env

  shipping-service:
    build: ./shipping-service
    container_name: nt-shipping-service
    ports:
      - "3002:3002"
    env_file:
      - ./shipping-service/.env

  notification-service:
    build: ./notification-service
    container_name: nt-notification-service
    ports:
      - "3004:3004"
    env_file:
      - ./notification-service/.env

  inventory-service:
    build: ./inventory-service
    container_name: nt-inventory-service
    env_file:
      - ./inventory-service/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  approval-service:
    build: ./approval_service
    container_name: nt-approval-service
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgresql://neondb_owner:npg_pbcRHf4a6Xtj@ep-dawn-dust-aoybpkj1-pooler.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      - ORCHESTRATOR_URL=http://orchestrator:4000
    depends_on:
      - redis

  task-queue:
    build: ./task-queue/task-queue-js
    container_name: nt-task-queue
    ports:
      - "4001:4001"
    environment:
      - TASK_QUEUE_PORT=4001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ORCHESTRATOR_URL=http://orchestrator:4000
      - PAYMENT_SERVICE_URL=http://payment-service:3001
      - SHIPPING_SERVICE_URL=http://shipping-service:3002
      - NOTIFICATION_SERVICE_URL=http://notification-service:3004
      - APPROVAL_SERVICE_URL=http://approval-service:3005
    depends_on:
      - redis

  frontend:
    build: ./frontend
    container_name: nt-frontend
    ports:
      - "80:80"
    depends_on:
      - orchestrator
