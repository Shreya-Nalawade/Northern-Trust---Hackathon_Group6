name: "order-fulfillment"
tasks:
  validate-order:
    type: "http"
    service: "order-service"
    depends_on: []

  process-payment:
    type: "http"
    service: "payment-service"
    depends_on: ["validate-order"]

  manual-approval:
    type: "human"
    assignee: "ops-team"
    condition: "total_value > 500"
    depends_on: ["process-payment"]

  check-inventory:
    type: "http"
    service: "inventory-service"
    depends_on: ["process-payment"]

  reserve-stock:
    type: "http"
    service: "inventory-service"
    depends_on: ["process-payment"]

  ship-order:
    type: "http"
    service: "shipping-service"
    depends_on: ["check-inventory", "reserve-stock"]

  send-confirmation:
    type: "http"
    service: "notification-service"
    depends_on: ["ship-order"]

  cancel-order:
    type: "http"
    service: "order-service"
    depends_on: []
    trigger: "on_failure_of:process-payment"
