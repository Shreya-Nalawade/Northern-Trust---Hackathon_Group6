name: "ecommerce_order_process"
tasks:
  reserve_inventory:
    type: "inventory"
    depends_on: []
  validate_order:
    type: "validation"
    depends_on: []
  charge_payment:
    type: "payment"
    depends_on: ["reserve_inventory", "validate_order"]
  create_shipping:
    type: "shipping"
    depends_on: ["charge_payment"]
  send_notification:
    type: "notification"
    depends_on: ["create_shipping"]

